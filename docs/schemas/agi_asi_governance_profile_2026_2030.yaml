version: 2.0.0
profile_id: agi_asi_governance_2026_2030
owner: group_ai_governance_office
applies_to:
  institution_classes: [Fortune500, Global2000, G-SIFI]
  geographies: [EU_EEA, UK, US, SG, HK]
  system_types: [CreditAI, TradingAI, EnterpriseRiskAI, AdvisoryAI, GenAICopilot, FrontierModel]
risk_tiers:
  L1:
    name: Limited Impact
    examples: [internal_productivity_assistant]
    min_controls: [GOV-001, DEV-001, OPS-001]
    approval_authority: domain_owner
  L2:
    name: High Impact
    examples: [credit_scoring_assistant, treasury_scenario_model]
    min_controls: [GOV-001, RISK-003, VAL-007, HUMAN-003, SEC-010]
    approval_authority: model_risk_committee
  L3:
    name: Frontier_or_Systemic
    examples: [autonomous_trading_agent, systemic_liquidity_advisor]
    min_controls: [GOV-001, RISK-003, VAL-007, HUMAN-003, SEC-010, THIRD-004, AUDIT-002]
    approval_authority: board_risk_committee
framework_crosswalk:
  EU_AI_ACT:
    annex_iv_sections:
      - system_description
      - intended_purpose
      - architecture_and_design
      - data_governance
      - risk_management
      - human_oversight
      - performance_and_robustness
      - cybersecurity
      - post_market_monitoring
  NIST_AI_RMF_1_0:
    lifecycle_functions: [Govern, Map, Measure, Manage]
  NIST_AI_600_1:
    profile: ai_rm_for_financial_services
  ISO_IEC_42001:
    aisms_controls_required: true
  OECD_AI_PRINCIPLES:
    principles: [inclusive_growth, human_centered_values, transparency, robustness_security, accountability]
  GDPR_ART_22:
    safeguards: [human_intervention, contestability, viewpoint_submission]
  FCRA_ECOA:
    controls: [adverse_action_reasons, data_permissible_purpose, disparate_impact_testing]
  BASEL_S11_7:
    controls: [independent_validation, conceptual_soundness, outcome_analysis, ongoing_monitoring]
  NIS2:
    controls: [cyber_risk_management, incident_reporting, resilience_testing]
  FCA_DUTY_SMCR:
    controls: [avoid_foreseeable_harm, fair_value, named_accountability]
  MAS_HKMA_FEAT:
    controls: [fairness, ethics, accountability, transparency]
mandatory_artifacts:
  - annex_iv_technical_file
  - model_card
  - system_card
  - validation_report
  - challenger_test_report
  - bias_fairness_assessment
  - explainability_assessment
  - drift_monitoring_baseline
  - incident_response_runbook
  - human_oversight_playbook
  - third_party_dependency_assessment
  - regulatory_traceability_matrix
ci_cd_policy_gates:
  pre_merge:
    required_checks:
      - no_prohibited_use_case
      - data_classification_declared
      - model_card_present
      - risk_tier_declared
  pre_deploy:
    required_checks:
      - independent_validation_passed
      - explainability_threshold_met
      - drift_baseline_set
      - cyber_controls_attested
  runtime:
    required_checks:
      - policy_logging_enabled
      - kill_switch_armed
      - human_oversight_active_for_L2_L3
      - incident_channel_registered
kri_limits:
  vendor_concentration_index_max: 0.30
  unresolved_l2_l3_policy_violations_max: 3
  mean_time_to_containment_minutes_max: 20
  severe_drift_events_per_quarter_max: 2
reporting_cadence:
  board_risk_committee: quarterly
  prudential_regulator: quarterly_and_event_triggered
  conduct_regulator: quarterly_and_event_triggered
  internal_audit: semi_annual
  model_risk_committee: monthly
roadmap:
  phase_1_2026_2027:
    dependencies: [inventory_and_tiering, baseline_policy_as_code, annex_iv_sr117_docs]
    outcomes: [material_model_coverage_100_percent, mandatory_gates_for_new_high_impact]
  phase_2_2027_2028:
    dependencies: [central_telemetry, validation_capacity, jurisdiction_overlays]
    outcomes: [continuous_compliance_scoring, evidence_reuse_over_60_percent]
  phase_3_2028_2029:
    dependencies: [containment_lab, crisis_sim_program, sector_coordination]
    outcomes: [frontier_onboarding_protocol, systemic_simulation_reporting]
  phase_4_2029_2030:
    dependencies: [compute_registry_participation, treaty_interface, shared_incident_taxonomy]
    outcomes: [international_interoperability, systemic_shock_resilience]
