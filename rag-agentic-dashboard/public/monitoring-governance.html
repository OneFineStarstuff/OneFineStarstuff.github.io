<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitoring & Observability Governance — G-SIFI Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0e1a;color:#e0e6ed;line-height:1.6}
.header{background:linear-gradient(135deg,#1a1f3a 0%,#0d2847 100%);padding:24px 32px;border-bottom:2px solid #ff5722}
.header h1{font-size:1.6rem;color:#ff5722;font-weight:700}.header .meta{font-size:0.8rem;color:#8892a4;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:24px 32px}
.card{background:#141929;border:1px solid #1e2642;border-radius:8px;padding:20px;transition:border-color .2s}
.card:hover{border-color:#ff5722}.card h3{color:#ff5722;font-size:1rem;margin-bottom:12px;border-bottom:1px solid #1e2642;padding-bottom:8px}
.kpi{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #0f1423}.kpi-label{color:#8892a4;font-size:0.85rem}.kpi-value{font-weight:600;color:#4fc3f7}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600}
.badge-green{background:#0d3b2e;color:#4caf50}.badge-yellow{background:#3b3a0d;color:#ffc107}.badge-red{background:#3b0d0d;color:#f44336}.badge-blue{background:#0d2847;color:#4fc3f7}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:0.82rem}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #1e2642}th{color:#ff5722;font-size:0.75rem;text-transform:uppercase}
.section-title{padding:16px 32px 0;color:#ff5722;font-size:1.1rem;font-weight:600}
.bar{height:20px;border-radius:3px;margin:4px 0;display:flex;align-items:center;padding-left:8px;font-size:0.72rem;color:#fff}
#loading{text-align:center;padding:60px;font-size:1.1rem;color:#8892a4}
</style></head><body>
<div class="header"><h1>AI Monitoring & Observability Governance</h1><div class="meta">MONGOV-GSIFI-WP-020 v1.0.0 | CONFIDENTIAL — Engineering / SRE / Compliance | <span id="date"></span></div></div>
<div id="loading">Loading monitoring data...</div>
<div id="content" style="display:none">
<div class="grid" id="kpi-grid"></div>
<h2 class="section-title">Sentinel Rule Categories</h2>
<div class="grid" id="sentinel-grid"></div>
<h2 class="section-title">Alert Management & Escalation</h2>
<div class="grid" id="alert-grid"></div>
<h2 class="section-title">Drift Detection</h2>
<div class="grid" id="drift-grid"></div>
<h2 class="section-title">SLA Monitoring & Incident Response</h2>
<div class="grid" id="sla-grid"></div>
</div>
<script>
const API='http://'+location.host+'/api/monitoring-governance';
document.getElementById('date').textContent=new Date().toISOString().slice(0,10);
async function load(){
try{
const [metrics,sentinel,alerts,drift,sla,incidents,stack]=await Promise.all([
fetch(API+'/metrics').then(r=>r.json()),fetch(API+'/sentinel/rules').then(r=>r.json()),
fetch(API+'/alerts').then(r=>r.json()),fetch(API+'/drift').then(r=>r.json()),
fetch(API+'/sla/services').then(r=>r.json()),fetch(API+'/incidents').then(r=>r.json()),
fetch(API+'/observability-stack').then(r=>r.json())
]);
const kg=document.getElementById('kpi-grid');
kg.innerHTML=`
<div class="card"><h3>Sentinel Engine</h3>
<div class="kpi"><span class="kpi-label">Total Rules</span><span class="kpi-value">${metrics.sentinelRules}</span></div>
<div class="kpi"><span class="kpi-label">Active Rules</span><span class="kpi-value">${metrics.activeRules}</span></div>
<div class="kpi"><span class="kpi-label">Evaluations/Day</span><span class="kpi-value">${(metrics.evaluationsPerDay/1000000).toFixed(1)}M</span></div>
<div class="kpi"><span class="kpi-label">Monitored Signals</span><span class="kpi-value">${metrics.monitoredSignals.toLocaleString()}</span></div></div>
<div class="card"><h3>Alert Response</h3>
<div class="kpi"><span class="kpi-label">Alerts (30d)</span><span class="kpi-value">${metrics.alertsLast30d.toLocaleString()}</span></div>
<div class="kpi"><span class="kpi-label">MTTR</span><span class="kpi-value">${metrics.mttr}</span></div>
<div class="kpi"><span class="kpi-label">SLA Compliance</span><span class="kpi-value" style="color:#4caf50">${metrics.slaCompliance}%</span></div>
<div class="kpi"><span class="kpi-label">Drift Detectors</span><span class="kpi-value">${metrics.driftDetectors}</span></div></div>
<div class="card"><h3>Observability Stack</h3>
<div class="kpi"><span class="kpi-label">Custom Metrics</span><span class="kpi-value">${metrics.customMetrics.toLocaleString()}</span></div>
<div class="kpi"><span class="kpi-label">Dashboards</span><span class="kpi-value">${metrics.dashboards}</span></div>
<div class="kpi"><span class="kpi-label">Metrics Platform</span><span class="kpi-value" style="font-size:0.8rem">${stack.metrics.platform}</span></div>
<div class="kpi"><span class="kpi-label">Log Ingestion</span><span class="kpi-value">${stack.logs.ingestionRate}</span></div></div>`;
const sg=document.getElementById('sentinel-grid');
const maxRules=Math.max(...(sentinel.categories||[]).map(c=>c.rules));
sg.innerHTML=`<div class="card" style="grid-column:1/-1"><h3>Rule Distribution (${sentinel.totalRules} total, ${sentinel.active} active)</h3>
${(sentinel.categories||[]).map(c=>`<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:0.82rem"><span>${c.category}</span><span style="color:#4fc3f7">${c.rules} rules</span></div><div class="bar" style="width:${c.rules/maxRules*100}%;background:linear-gradient(90deg,#ff5722,#ff9800)">${c.severity}</div></div>`).join('')}</div>`;
const ag=document.getElementById('alert-grid');
ag.innerHTML=`<div class="card"><h3>Severity Distribution</h3><table><tr><th>Severity</th><th>Count (30d)</th><th>SLA</th><th>Team</th></tr>
${(alerts.severityDistribution||[]).map(s=>`<tr><td><span class="badge ${s.severity.includes('Critical')?'badge-red':s.severity.includes('High')?'badge-yellow':s.severity.includes('Medium')?'badge-blue':'badge-green'}">${s.severity}</span></td><td>${s.count}</td><td style="font-size:0.75rem">${s.sla}</td><td>${s.onCallTeam}</td></tr>`).join('')}</table></div>
<div class="card"><h3>Escalation Chain</h3><table><tr><th>Level</th><th>Role</th><th>Timeout</th></tr>
${(alerts.escalationChain||[]).map(e=>`<tr><td>${e.level}</td><td>${e.role}</td><td>${e.timeout}</td></tr>`).join('')}</table></div>`;
const dg=document.getElementById('drift-grid');
dg.innerHTML=`<div class="card"><h3>Drift Detectors</h3><table><tr><th>Type</th><th>Threshold</th><th>Frequency</th></tr>
${(drift.detectors||[]).map(d=>`<tr><td>${d.type}</td><td>${d.threshold||d.sensitivity||'-'}</td><td>${d.frequency}</td></tr>`).join('')}</table></div>
<div class="card"><h3>Recent Drift Events</h3><table><tr><th>Model</th><th>Type</th><th>Status</th></tr>
${(drift.recentDriftEvents||[]).map(e=>`<tr><td>${e.model}</td><td>${e.type}</td><td><span class="badge ${e.status==='RESOLVED'?'badge-green':'badge-yellow'}">${e.status}</span></td></tr>`).join('')}</table></div>`;
const slg=document.getElementById('sla-grid');
slg.innerHTML=`<div class="card"><h3>Service SLA Status</h3><table><tr><th>Service</th><th>SLA</th><th>Availability</th><th>P95 Latency</th><th>Status</th></tr>
${(sla.services||[]).map(s=>`<tr><td>${s.service}</td><td style="font-size:0.75rem">${s.sla}</td><td>${s.actual.availability}%</td><td>${s.actual.p95Latency}</td><td><span class="badge ${s.status==='COMPLIANT'?'badge-green':'badge-yellow'}">${s.status}</span></td></tr>`).join('')}</table></div>
<div class="card"><h3>Incident Response</h3>
<div class="kpi"><span class="kpi-label">MTTD</span><span class="kpi-value">${incidents.meanTimeToDetect}</span></div>
<div class="kpi"><span class="kpi-label">MTTR</span><span class="kpi-value">${incidents.meanTimeToRespond}</span></div>
<div class="kpi"><span class="kpi-label">Target MTTR</span><span class="kpi-value">${incidents.targetMTTR}</span></div>
<div class="kpi"><span class="kpi-label">Incidents (30d)</span><span class="kpi-value">${incidents.incidents30d}</span></div>
<div class="kpi"><span class="kpi-label">Runbooks</span><span class="kpi-value">${incidents.runbooks}</span></div></div>`;
document.getElementById('loading').style.display='none';document.getElementById('content').style.display='block';
}catch(e){document.getElementById('loading').textContent='Error: '+e.message}}
load();
</script></body></html>
