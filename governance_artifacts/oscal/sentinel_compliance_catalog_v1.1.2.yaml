      controls:
        - id: AUD-001
          title: PQC WORM Telemetry
          params:
            - id: signature-algorithm
              values: ["ML-DSA-65", "CRYSTALS-Dilithium"]
            - id: persistence-policy
              values: ["S3 Object Lock Compliance Mode"]
          statements:
            - id: AUD-001_smt.1
              description: All governance telemetry must be immutable and signed using post-quantum algorithms.
    - id: RSK
      title: Systemic Risk and Verification
      controls:
        - id: RSK-001
          title: ZK Systemic Risk Proofs
          params:
