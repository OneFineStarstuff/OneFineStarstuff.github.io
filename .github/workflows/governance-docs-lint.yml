name: Governance Docs Lint

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '.markdownlint.json'
      - '.markdownlintignore'
      - 'scripts/lint_governance_docs.sh'
      - 'tests/test_lint_governance_docs.sh'
      - 'Makefile'
      - 'tests/test_lint_governance_docs.sh'
      - 'Makefile'
      - '.github/workflows/governance-docs-lint.yml'
  push:
    branches: [ main ]
    paths:
      - 'docs/**/*.md'
      - '.markdownlint.json'
      - '.markdownlintignore'
      - 'scripts/lint_governance_docs.sh'
      - 'tests/test_lint_governance_docs.sh'
      - 'Makefile'
      - '.github/workflows/governance-docs-lint.yml'

permissions:
  contents: read

concurrency:
  group: governance-docs-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-governance-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v2.7.0 # v4.2.2 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@8028d655f0e30ca9b66726fe2f6d193fd8962ff4 # v4.2.0 # v4.2.2
        with:
          node-version: '20'

      - name: Validate lint script syntax
        run: bash -n scripts/lint_governance_docs.sh

      - name: Validate test script syntax
        run: bash -n tests/test_lint_governance_docs.sh

      - name: Shellcheck lint scripts
        uses: ludeeus/action-shellcheck@94e4a7d7ca9a4589251034c201409d80d200e007 # v2.0.0 # v2.0.0
        with:
          scandir: "scripts tests"
          severity: warning

      - name: Run governance docs check target
        run: make governance-docs-check
